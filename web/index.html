  <style>
    body {
      margin: 0; padding: 0;
      overflow: hidden;
      background-color: #0A192F;
    }
    
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #0A192F 0%, #1A2744 100%);
      z-index: 9999;
    }
    
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: #00FFC8;
      border-radius: 50%;
      opacity: 0.3;
      animation: float 6s infinite ease-in-out;
    }
    
    .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 80%; top: 70%; animation-delay: 1.5s; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); opacity: 0.3; }
      50% { transform: translateY(-20px); opacity: 0.6; }
    }
    
    .logo-container {
      position: relative;
      width: 100px; height: 100px;
      margin-bottom: 20px;
    }
    
    .logo-ring {
      position: absolute;
      width: 100%; height: 100%;
      border: 3px solid transparent;
      border-radius: 50%;
      animation: rotate 2s linear infinite;
      border-top-color: #00FFC8;
    }
    
    .logo-symbol {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: monospace;
      font-size: 32px;
      color: #00FFC8;
      font-weight: bold;
    }

    .loading-bar-container {
      width: 150px; height: 3px;
      background: rgba(0, 255, 200, 0.1);
      border-radius: 2px;
      margin: 20px auto;
    }
    
    .loading-bar {
      height: 100%;
      width: 50%;
      background: #00FFC8;
      animation: loading 2s infinite ease-in-out;
    }
    
    @keyframes rotate { to { transform: rotate(360deg); } }
    @keyframes loading { 0% { margin-left: 0; width: 0%; } 50% { margin-left: 0; width: 100%; } 100% { margin-left: 100%; width: 0%; } }
  </style>
</head>

<body>
  <div class="loading" id="loading">

    <div class="loading-content" style="text-align: center;">

  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.5s ease';
          setTimeout(function() { loading.style.display = 'none'; }, 500);
        }
      }, 200);
    });
  </script>
</body>
